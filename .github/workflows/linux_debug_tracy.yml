name: Linux CI (Tracy, Debug)

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: stellargroup/build_env:17

    steps:
    - uses: actions/checkout@v6
    - name: Configure
      shell: bash
      run: |
          cmake \
              . \
              -Bbuild \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DHPX_WITH_MALLOC=system \
              -DHPX_WITH_FETCH_ASIO=ON \
              -DHPX_WITH_ASIO_TAG=asio-1-34-2 \
              -DHPX_WITH_EXAMPLES=ON \
              -DHPX_WITH_TESTS=ON \
              -DHPX_WITH_TESTS_MAX_THREADS_PER_LOCALITY=2 \
              -DHPX_WITH_VERIFY_LOCKS=ON \
              -DHPX_WITH_VERIFY_LOCKS_BACKTRACE=ON \
              -DHPX_WITH_CHECK_MODULE_DEPENDENCIES=On \
              -DHPX_WITH_TRACY=ON \
              -DHPX_WITH_FETCH_TRACY=ON
    - name: Build
      shell: bash
      run: |
          cmake --build build --target all
          cmake --build build --target examples
    - name: Verify Tracy is active
      shell: bash
      run: |
          # Compile-time check: HPX_HAVE_TRACY must be defined
          printf '#include <hpx/config.hpp>\n#ifndef HPX_HAVE_TRACY\n#error "HPX_HAVE_TRACY not defined"\n#endif\nint main(){return 0;}\n' > /tmp/check_tracy.cpp
          c++ -std=c++17 \
              -c \
              -I build/libs/core/config/include \
              -I libs/core/config/include \
              /tmp/check_tracy.cpp -o /tmp/check_tracy.o
          echo "Tracy compile-time verification passed."
    - name: Test
      shell: bash
      run: |
          cd build
          ctest \
            --output-on-failure \
            --tests-regex tests.examples \
            --exclude-regex tests.examples.transpose.transpose_block_numa \
            --exclude-regex tests.examples.quickstart.1d_wave_equation
